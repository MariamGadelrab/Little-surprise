<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Something For You 💗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="compliment-style.css">
</head>
<body>
    <!-- Background decorations -->
    <div class="background-decorations">
        <!-- Hearts -->
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        
        <!-- Sparkles -->
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        
        <!-- Balloons -->
        <div class="balloon balloon-pink"></div>
        <div class="balloon balloon-lavender"></div>
        <div class="balloon balloon-blue"></div>
        <div class="balloon balloon-yellow"></div>
        
        <!-- Confetti dots -->
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
    </div>

    <!-- Main content -->
    <div class="container">
        <h1 class="title">A little something for you 💗</h1>
        <p class="subtitle">Click the button to see something I want to tell you</p>

        <!-- Message card (hidden initially) -->
        <div class="message-card hidden">
            <p class="message-text"></p>
        </div>

        <!-- Main button -->
        <button class="compliment-button">Tell me something 💌</button>

        <!-- Back button -->
        <button class="back-button">Back to surprises 🎁</button>
    </div>

    <script src="compliment-script.js"></script>
</body>
</html>
