<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Surprise 🎁</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="surprise-style.css">
</head>
<body>
    <!-- Background decorations -->
    <div class="background-decorations">
        <!-- Sparkles/Stars -->
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        
        <!-- Hearts -->
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        
        <!-- Confetti dots -->
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        <div class="confetti-dot"></div>
        
        <!-- Balloons -->
        <div class="balloon balloon-pink"></div>
        <div class="balloon balloon-lavender"></div>
        <div class="balloon balloon-blue"></div>
        <div class="balloon balloon-yellow"></div>
    </div>

    <!-- Main content -->
    <div class="container">
        <h1 class="title">Choose your birthday surprise 🎁</h1>
        <p class="subtitle">Pick one… or open them all 💗</p>

        <!-- Gift boxes -->
        <div class="gifts-container">
            <!-- Gift 1 -->
            <div class="gift-box" data-link="plans.html">
                <div class="gift-wrap gift-pink">
                    <div class="ribbon-vertical"></div>
                    <div class="ribbon-horizontal"></div>
                    <div class="bow">
                        <div class="bow-left"></div>
                        <div class="bow-right"></div>
                        <div class="bow-center"></div>
                    </div>
                </div>
                <p class="gift-label">Our Little Plans</p>
            </div>

            <!-- Gift 2 -->
            <div class="gift-box" data-link="compliment.html">
                <div class="gift-wrap gift-lavender">
                    <div class="ribbon-vertical"></div>
                    <div class="ribbon-horizontal"></div>
                    <div class="bow">
                        <div class="bow-left"></div>
                        <div class="bow-right"></div>
                        <div class="bow-center"></div>
                    </div>
                </div>
                <p class="gift-label">A few things I want<br>to tell you 💌</p>
            </div>

            <!-- Gift 3 -->
            <div class="gift-box" data-link="letter.html">
                <div class="gift-wrap gift-blue">
                    <div class="ribbon-vertical"></div>
                    <div class="ribbon-horizontal"></div>
                    <div class="bow">
                        <div class="bow-left"></div>
                        <div class="bow-right"></div>
                        <div class="bow-center"></div>
                    </div>
                </div>
                <p class="gift-label">💌 A letter just for you</p>
            </div>
        </div>
    </div>

    <script src="surprise-script.js"></script>
</body>
</html>
